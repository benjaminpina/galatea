name: galatea_studio
description: "Galatea Studio — Desktop scenario editor for the Galatea Simulation Suite"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database (SQLite via drift)
  drift: ^2.26.0
  sqlite3_flutter_libs: ^0.5.32

  # File system
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.3.7

  # UI
  cupertino_icons: ^1.0.8
  flutter_colorpicker: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation for drift
  drift_dev: ^2.26.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true
